steps:
  # 1. Build Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/charting-backend', './backend']
  
  # 2. Build Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/charting-frontend', './frontend']
  
  # 3. Build Freqtrade
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/freqtrade-bot', '-f', './freqtrade/Dockerfile', '.']

  # 4. Push Images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/charting-backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/charting-frontend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/freqtrade-bot']

images:
  - 'gcr.io/$PROJECT_ID/charting-backend'
  - 'gcr.io/$PROJECT_ID/charting-frontend'
  - 'gcr.io/$PROJECT_ID/freqtrade-bot'
